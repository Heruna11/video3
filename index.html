<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Vimeo</title>

<style>

body{
    background:#0f0f0f;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    font-family:Arial;
}

.social-card{
    width:780px;
    background:#181818;
    border:2px solid write;
    border-radius:25px;
    padding:30px;
    text-align:center;
    box-shadow:0 0 25px rgba(176,132,255,.3);
}

.social-card h1{
    color:white;
    font-size:50px;
    margin-bottom:20px;
}

.social-card p{
    color:#d1d5db;
    margin-bottom:25px;
    font-size:18px;
}

.social-card iframe{
    width:100%;
    height:420px;
    border-radius:18px;
    border:2px solid white;
}

</style>
</head>

<body>

<div class="social-card">

    <h1>VIDEO DESDE VIMEO</h1>

    

    <iframe
        src="https://player.vimeo.com/video/76979871"
        frameborder="0"
        allowfullscreen>
    </iframe>

</div>

</body>
</html>
